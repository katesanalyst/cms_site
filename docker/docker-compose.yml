services:
  cms:
    build:
      context: ../primeagro-cms
      dockerfile: ../docker/cms.Dockerfile
    ports:
      - "3334:3334"
    volumes:
      - cms-data:/app/data
      - cms-uploads:/app/public/uploads
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - NEXTAUTH_SECRET=primeagro-cms-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3334
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    restart: unless-stopped

  frontend:
    build:
      context: ../primeagro-web
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3333:3000"
    environment:
      - CMS_URL=http://cms:3334
      - NEXTAUTH_URL=http://localhost:3333
    depends_on:
      - cms
    restart: unless-stopped

volumes:
  cms-data:
  cms-uploads:
