services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: primeagro
      POSTGRES_USER: primeagro
      POSTGRES_PASSWORD: primeagro123
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primeagro -d primeagro"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cms:
    build:
      context: ../primeagro-cms
      dockerfile: ../docker/cms.Dockerfile
    ports:
      - "3334:3334"
    volumes:
      - cms-uploads:/app/public/uploads
    environment:
      - DATABASE_URL=postgresql://primeagro:primeagro123@db:5432/primeagro
      - NEXTAUTH_SECRET=primeagro-cms-secret-change-in-production
      - NEXTAUTH_URL=http://localhost:3334
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../primeagro-web
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3333:3000"
    environment:
      - CMS_URL=http://cms:3334
      - NEXTAUTH_URL=http://localhost:3333
    depends_on:
      - cms
    restart: unless-stopped

volumes:
  pg-data:
  cms-uploads:
