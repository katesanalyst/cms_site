services:
  - type: web
    name: primeagro-cms
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma db push --skip-generate && node seed-all.cjs
    startCommand: npx prisma db push --skip-generate && node seed-all.cjs && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: primeagro-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://primeagro-cms.onrender.com
      - key: PORT
        value: 3334

databases:
  - name: primeagro-db
    plan: free
    databaseName: primeagro
