app = "primeagro-cms"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3334"
  NEXTAUTH_SECRET = "primeagro-cms-production-secret-change-me"

[http_service]
  internal_port = 3334
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
